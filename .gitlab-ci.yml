stages:
  - tests

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.12"
  REDIS_PORT: 6378
  TEST_RQ_MAX_QUEUE_WAIT_TIME: 45

tests:
  stage: tests
  image: python:${PYTHON_VERSION}
  script:
    # Install redis
    - apt-get update
    - apt-get install redis -y
    # Run the redis server
    - redis-server --daemonize yes --port "$REDIS_PORT"

    # Install project dependencies
    - pip install ."[dev]"

    # Check formatting
    - black --check app
    - isort --check-only app

    # Run unit tests
    - echo "PYTEST_ARGS=$PYTEST_ARGS"
    - |
      if [ -z "$PYTEST_ARGS" ]; then 
        pytest -n 4 --dist=loadscope app; 
      else 
        pytest $PYTEST_ARGS; 
      fi
  cache:
    paths:
      - .cache/pip
